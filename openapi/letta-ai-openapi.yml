components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'API key created at https://app.letta.com/api-keys, passed as `Authorization: Bearer
        YOUR_API_KEY`.'
  responses:
    Unauthorized:
      description: Missing or invalid Bearer API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: The request payload failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HTTPValidationError'
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
              msg:
                type: string
              type:
                type: string
    AgentState:
      type: object
      description: A Letta stateful agent, including its memory, tools, sources, and model configuration.
      properties:
        id:
          type: string
          example: agent-123e4567-e89b-42d3-8456-426614174000
        name:
          type: string
        agent_type:
          type: string
        system:
          type: string
        description:
          type: string
        model:
          type: string
        embedding:
          type: string
        llm_config:
          type: object
          additionalProperties: true
        embedding_config:
          type: object
          additionalProperties: true
        memory:
          type: object
          additionalProperties: true
        blocks:
          type: array
          items:
            type: object
            additionalProperties: true
        tools:
          type: array
          items:
            type: object
            additionalProperties: true
        sources:
          type: array
          items:
            type: object
            additionalProperties: true
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateAgentRequest:
      type: object
      properties:
        name:
          type: string
        system:
          type: string
        agent_type:
          type: string
          enum:
          - memgpt_agent
          - react_agent
          - workflow_agent
          - sleeptime_agent
        model:
          type: string
          example: openai/gpt-4o
        embedding:
          type: string
          example: openai/text-embedding-3-small
        memory_blocks:
          type: array
          items:
            type: object
            additionalProperties: true
        tools:
          type: array
          items:
            type: string
        tool_ids:
          type: array
          items:
            type: string
        source_ids:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        include_base_tools:
          type: boolean
          default: true
    Block:
      type: object
      description: A core-memory block - a labeled, always-in-context chunk of agent memory.
      properties:
        id:
          type: string
        label:
          type: string
          example: persona
        value:
          type: string
        limit:
          type: integer
          description: Character limit for the block value.
        is_template:
          type: boolean
        template_name:
          type: string
        read_only:
          type: boolean
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
        hidden:
          type: boolean
        tags:
          type: array
          items:
            type: string
    CreateBlockRequest:
      type: object
      required:
      - label
      - value
      properties:
        label:
          type: string
        value:
          type: string
        limit:
          type: integer
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
    Archive:
      type: object
      description: An agent's out-of-context, searchable long-term memory archive.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        vector_db_provider:
          type: string
        embedding_config:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    Passage:
      type: object
      description: A single unit of archival memory - a chunk of text with its embedding.
      properties:
        id:
          type: string
        text:
          type: string
        archive_id:
          type: string
        source_id:
          type: string
        file_id:
          type: string
        file_name:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    Tool:
      type: object
      description: A function an agent can call.
      properties:
        id:
          type: string
        name:
          type: string
        tool_type:
          type: string
        description:
          type: string
        source_type:
          type: string
          example: python
        source_code:
          type: string
        json_schema:
          type: object
          additionalProperties: true
        args_json_schema:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
        pip_requirements:
          type: array
          items:
            type: object
            additionalProperties: true
        default_requires_approval:
          type: boolean
    CreateToolRequest:
      type: object
      required:
      - source_code
      properties:
        source_code:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        source_type:
          type: string
          default: python
        json_schema:
          type: object
          additionalProperties: true
    McpServerConfig:
      type: object
      description: A configured remote MCP (Model Context Protocol) tool server. Shape varies by transport
        (stdio, SSE, or Streamable HTTP).
      properties:
        id:
          type: string
        server_name:
          type: string
        type:
          type: string
          enum:
          - sse
          - stdio
          - streamable_http
        server_url:
          type: string
          format: uri
        command:
          type: string
        args:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        custom_headers:
          type: object
          additionalProperties:
            type: string
    Source:
      type: object
      description: A data source (also exposed as a folder) holding uploaded files for agent grounding.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        instructions:
          type: string
        embedding_config:
          type: object
          additionalProperties: true
        vector_db_provider:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    CreateSourceRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        description:
          type: string
        instructions:
          type: string
        embedding:
          type: string
    FileMetadata:
      type: object
      properties:
        id:
          type: string
        file_name:
          type: string
        source_id:
          type: string
        file_type:
          type: string
        file_size:
          type: integer
        processing_status:
          type: string
        created_at:
          type: string
          format: date-time
    Identity:
      type: object
      description: An end user of a multi-tenant Letta deployment.
      properties:
        id:
          type: string
        identifier_key:
          type: string
        name:
          type: string
        identity_type:
          type: string
          enum:
          - org
          - user
          - other
        project_id:
          type: string
        agent_ids:
          type: array
          items:
            type: string
        block_ids:
          type: array
          items:
            type: string
        properties:
          type: array
          items:
            type: object
            additionalProperties: true
    CreateIdentityRequest:
      type: object
      required:
      - identifier_key
      - name
      - identity_type
      properties:
        identifier_key:
          type: string
        name:
          type: string
        identity_type:
          type: string
          enum:
          - org
          - user
          - other
        agent_ids:
          type: array
          items:
            type: string
        block_ids:
          type: array
          items:
            type: string
    Group:
      type: object
      description: A multi-agent group coordinating several agents around shared memory.
      properties:
        id:
          type: string
        description:
          type: string
        manager_type:
          type: string
          enum:
          - round_robin
          - supervisor
          - dynamic
          - sleeptime
          - voice_sleeptime
        manager_agent_id:
          type: string
        agent_ids:
          type: array
          items:
            type: string
        shared_block_ids:
          type: array
          items:
            type: string
        termination_token:
          type: string
        max_turns:
          type: integer
    CreateGroupRequest:
      type: object
      required:
      - agent_ids
      - manager_config
      properties:
        description:
          type: string
        agent_ids:
          type: array
          items:
            type: string
        shared_block_ids:
          type: array
          items:
            type: string
        manager_config:
          type: object
          additionalProperties: true
    Model:
      type: object
      description: An LLM or embedding model available on Letta.
      properties:
        handle:
          type: string
          example: openai/gpt-4o
        name:
          type: string
        display_name:
          type: string
        provider_type:
          type: string
        provider_name:
          type: string
        model_type:
          type: string
        context_window:
          type: integer
        max_tokens:
          type: integer
    Provider:
      type: object
      description: A bring-your-own-key model provider configured on a Letta deployment.
      properties:
        id:
          type: string
        name:
          type: string
        provider_type:
          type: string
          example: anthropic
        provider_category:
          type: string
          enum:
          - base
          - byok
        api_key:
          type: string
          writeOnly: true
        base_url:
          type: string
        region:
          type: string
        updated_at:
          type: string
          format: date-time
        last_synced:
          type: string
          format: date-time
    CreateProviderRequest:
      type: object
      required:
      - name
      - provider_type
      - api_key
      properties:
        name:
          type: string
        provider_type:
          type: string
        api_key:
          type: string
        base_url:
          type: string
    Run:
      type: object
      description: An asynchronous execution of an agent turn.
      properties:
        id:
          type: string
        status:
          type: string
          enum:
          - created
          - running
          - completed
          - failed
          - cancelled
        agent_id:
          type: string
        background:
          type: boolean
        stop_reason:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        ttft_ns:
          type: integer
          description: Time to first token, in nanoseconds.
        total_duration_ns:
          type: integer
    Job:
      type: object
      description: A background job, such as a file-processing or batch operation.
      properties:
        id:
          type: string
        status:
          type: string
        job_type:
          type: string
        agent_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    Step:
      type: object
      description: A single model call within a run.
      properties:
        id:
          type: string
        run_id:
          type: string
        agent_id:
          type: string
        provider_name:
          type: string
        model:
          type: string
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        stop_reason:
          type: string
        trace_id:
          type: string
    Template:
      type: object
      description: A Cloud-only versioned agent configuration used to deploy new agents.
      properties:
        name:
          type: string
        project_id:
          type: string
        version:
          type: integer
        agent_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LettaMessage:
      type: object
      description: A single message in an agent conversation (user, assistant, tool call/return, or reasoning).
      properties:
        id:
          type: string
        message_type:
          type: string
          enum:
          - user_message
          - assistant_message
          - reasoning_message
          - tool_call_message
          - tool_return_message
          - system_message
        content:
          type: string
        date:
          type: string
          format: date-time
    CreateMessageRequest:
      type: object
      required:
      - messages
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                - user
                - system
              content:
                type: string
        stream_steps:
          type: boolean
          default: false
        stream_tokens:
          type: boolean
          default: false
