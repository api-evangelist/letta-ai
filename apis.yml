  - url: https://docs.letta.com/api-reference/jobs/list
    type: APIReference
  - url: openapi/letta-ai-openapi.yml
    type: OpenAPI
  description: Inspect the asynchronous execution history behind agent messages.
    List and retrieve runs and their messages, metrics, usage, trace, and
    stream; list and cancel background jobs; and list steps (individual model
    calls within a run) with per-step feedback, metrics, and trace.
- aid: letta-ai:letta-ai-templates-api
