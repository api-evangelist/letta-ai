- FOCUS
description: >-
  FinOps view of Letta spend. Letta Cloud (Developer API plan) bills a
  monthly base subscription plus metered usage - dollars per active agent per
  month and dollars per second of tool execution - on top of pay-as-you-go
  LLM and embedding usage that is passed through from whichever model
  provider (OpenAI, Anthropic, Google, etc.) an agent is configured to use.
  The Personal Free and Pro tiers are flat-rate or free, bounded by agent
  count rather than metered usage. The core Letta server is Apache-2.0
  licensed and free to self-host, in which case the dominant costs are your
  own compute plus whatever model provider API keys you bring.
notes: >-
  Per-unit Cloud rates should be reconciled against
  https://docs.letta.com/guides/build-with-letta/pricing before use. Because
  LLM/embedding token spend is pass-through rather than marked up by Letta,
  the largest and most variable cost driver for most deployments is the
  configured model provider, not the Letta platform fee itself.
sources:
- https://www.letta.com/
- https://docs.letta.com/guides/build-with-letta/pricing
- https://github.com/letta-ai/letta
